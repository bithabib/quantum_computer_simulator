    <script>
        document.addEventListener("DOMContentLoaded", function () {
            console.log("DOM fully loaded and parsed");
            var slit1 = document.getElementById("slit_1");
            var slit2 = document.getElementById("slit_2");
            slitDistanceWidthHandler(document.getElementById("slit_width"), document.getElementById("distance_bitween_two_slits"), document.getElementById("screen_distance"));
            // JavaScript to adjust the gap between slit_1 and slit_2
            var distance_bitween_two_slits = document.getElementById("distance_bitween_two_slits");
            distance_bitween_two_slits.addEventListener("input", function () {
                var distance = this.value; // Get the value of the slider
                slit1.style.marginRight = distance + "px"; // Set margin-right for slit_1
                slit2.style.marginLeft = distance + "px"; // Set margin-left for slit_2
                slitDistanceWidthHandler(document.getElementById("slit_width"), this, document.getElementById("screen_distance"));
            });

            // JavaScript to adjust the width of the slits
            var slit_width = document.getElementById("slit_width");
            slit_width.addEventListener("input", function () {
                slitDistanceWidthHandler(this, document.getElementById("distance_bitween_two_slits"), document.getElementById("screen_distance"));
            });

            // JavaScript to adjust the distance to the screen
            var screen_distance = document.getElementById("screen_distance");
            screen_distance.addEventListener("input", function () {
                slitDistanceWidthHandler(document.getElementById("slit_width"), document.getElementById("distance_bitween_two_slits"), this);
            });


            var canvas = document.getElementById('waveCanvas');
            // var myChart = null;
            // get canvas width and height


            // Fraunhofer two-slit intensity as a function of the diffraction angle theta.
            //   alpha = pi * d * sin(theta) / lambda   -> interference between the two slits
            //   beta  = pi * a * sin(theta) / lambda   -> single-slit diffraction envelope
            //   I(theta) = [sin(beta)/beta]^2 * cos^2(alpha),  normalised to 1 at the centre.
            // (The old code double-counted by adding a shifted copy of the pattern to itself
            //  and ignored the slit width; this is the standard, physically correct formula.)
            function twoSlitIntensity(theta, wavelength, slitSeparation, slitWidth) {
                const s = Math.sin(theta);
                const alpha = Math.PI * slitSeparation * s / wavelength;
                const beta = Math.PI * slitWidth * s / wavelength;
                const envelope = (beta === 0) ? 1 : Math.pow(Math.sin(beta) / beta, 2);
                return envelope * Math.pow(Math.cos(alpha), 2);
            }

            function slitDistanceWidthHandler(widthEventHandler, distanceEventHandler, screenDistanceEventHandler) {
                var width = Number(widthEventHandler.value);            // slit width (micrometres)
                var distanceSplit = Number(distanceEventHandler.value); // slit separation (micrometres)
                var sDistance = Number(screenDistanceEventHandler.value); // screen distance (metres)
                slit1.style.width = width + "px";
                slit2.style.width = width + "px";

                const wavelength = 0.5;                                 // green light, ~0.5 um (fixed)
                const slitWidth = width;                                // a (um)
                const slitSeparation = Math.max(distanceSplit, width);  // d >= a to stay physical (um)
                const screenDistance = sDistance;                       // D (m): scales fringe spacing
                const thetaMax = 0.25;                                  // half-angle of the view window (rad)
                const N = 800;

                var labels = [];
                var intensityData = [];
                for (let i = 0; i < N; i++) {
                    const theta = -thetaMax + (2 * thetaMax) * i / (N - 1);
                    const I = twoSlitIntensity(theta, wavelength, slitSeparation, slitWidth);
                    // position on the screen; a larger screen distance spreads the fringes out
                    const xScreen = screenDistance * Math.tan(theta);
                    labels.push(xScreen.toFixed(2));
                    intensityData.push(I);
                }

                // Light up the 15 bars above the screen from the central band of the pattern.
                var downGradeBy = Math.floor(N / 15);
                var downsampled = _.chunk(intensityData, downGradeBy)
                    .map(function (chunk) { return _.mean(chunk); }).slice(0, 15);
                for (var b = 1; b <= 15; b++) {
                    var bar1 = document.getElementById("constructive_" + b + "1");
                    var bar2 = document.getElementById("constructive_" + b + "2");
                    if (!bar1 || !bar2) continue;
                    var level = Math.round(255 * (downsampled[b - 1] || 0)); // intensity 0..1 -> 0..255
                    bar1.style.background = "linear-gradient(to left, rgba(" + level + ", 0, 0, 1) 20%, rgba(" + level + ", 0, 0, 0) 100%)";
                    bar2.style.background = "linear-gradient(to right, rgba(" + level + ", 0, 0, 1) 20%, rgba(" + level + ", 0, 0, 0) 100%)";
                }
                createChart(labels, intensityData);
            }
            var myChart;
            function createChart(labels, intensityData) {
                if (!myChart) {
                    myChart = new Chart($("#waveCanvas"), {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Eshyana: Double-slit intensity pattern',
                                data: intensityData,
                                borderColor: 'rgba(255,0,0,0.85)',
                                backgroundColor: 'rgba(255,0,0,0.08)',
                                fill: true,
                                tension: 0.1,
                                pointRadius: 0,
                            }]
                        },
                        options: {
                            animation: false,
                            scales: {
                                x: { title: { display: true, text: 'position on screen' }, ticks: { maxTicksLimit: 11 } },
                                y: { min: 0, max: 1.05, title: { display: true, text: 'relative intensity' } }
                            },
                            plugins: {
                                zoom: {
                                    zoom: {
                                        wheel: { enabled: true },
                                        pinch: { enabled: true },
                                        mode: 'x',
                                    }
                                }
                            }
                        }
                    });

                }
                else {
                    myChart.data.labels = labels;
                    myChart.data.datasets[0].data = intensityData;
                    myChart.update();
                }

            }

        });
    </script>
